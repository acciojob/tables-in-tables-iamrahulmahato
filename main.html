<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exact Match Layout</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 20px;
            background-color: #ffffff;
        }
        /* Style for the list formatting inside Table 1 */
        .list-cell {
            text-align: left;
            padding-left: 60px;
        }
        .list-cell ul {
            list-style-type: disc;
            margin: 0;
            padding: 0;
        }
        .list-cell li {
            margin-bottom: 8px;
            font-size: 18px;
        }
        /* Text styling */
        th, td {
            font-family: Arial, sans-serif;
        }
        .purple-link {
            color: #6f42c1;
            text-decoration: underline;
            font-weight: bold;
        }
        .black-bg {
            background-color: #000000;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <table border="1" cellspacing="4" cellpadding="10" style="width: 100%; border-color: #000000;">
        <tr>
            <td width="50%" valign="middle" height="250">
                <table border="1" cellspacing="4" cellpadding="6" style="width: 100%;">
                    <tr>
                        <th colspan="2" align="center" style="font-size: 18px; padding: 6px;">Nested Table 2</th>
                    </tr>
                    <tr>
                        <th width="50%" align="center">Column 1</th>
                        <th width="50%" align="center">Column 2</th>
                    </tr>
                    <tr>
                        <td align="center">abc</td>
                        <td align="center">def</td>
                    </tr>
                </table>
            </td>

            <td width="50%" valign="middle">
                <table border="1" cellspacing="4" cellpadding="6" style="width: 100%;">
                    <tr>
                        <th align="center" style="font-size: 18px; padding: 6px;">Nested Table 1</th>
                    </tr>
                    <tr>
                        <td class="list-cell" height="120" valign="middle">
                            <ul>
                                <li>List item</li>
                                <li>List item</li>
                                <li>List item</li>
                            </ul>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        
        <tr>
            <td valign="middle" height="150">
                <table border="1" cellspacing="4" cellpadding="6" style="width: 100%;">
                    <tr>
                        <th colspan="2" align="center" style="font-size: 18px; padding: 6px;">Nested Table 3</th>
                    </tr>
                    <tr>
                        <td width="50%" align="center"><a href="#" class="purple-link">Nested Table</a></td>
                        <td width="50%" align="center">Demo Continued</td>
                    </tr>
                </table>
            </td>

            <td valign="middle">
                <table border="1" cellspacing="4" cellpadding="6" style="width: 100%;">
                    <tr>
                        <th align="center" style="font-size: 18px; padding: 6px;">Nested Table 4</th>
                    </tr>
                    <tr>
                        <td class="black-bg" style="padding: 8px;">HTML</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
